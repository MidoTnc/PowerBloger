  <style>
    /* 스크롤바 숨기기 스타일 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 텍스트 줄 수 제한 */
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* 로딩 화면 */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #f8faf8 0%, #e8f5e9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    #splash-screen img {
      width: 120px;
      height: 120px;
      animation: splash-bounce 1.2s ease-in-out infinite;
    }
    #splash-screen h1 {
      margin-top: 20px;
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }
    #splash-screen p {
      margin-top: 8px;
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }
    #splash-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 3px;
      border-radius: 50%;
      background: #03C75A;
      animation: splash-dot 1.4s infinite ease-in-out both;
    }
    #splash-dots span:nth-child(1) { animation-delay: 0s; }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 나만의 Firebase 클라우드 세팅 ---
    const firebaseConfig = {

    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'powerbloger-app';

    // --- 제미나이 API 호출 함수 ---
    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = "AIzaSyDav8mrjMLDnGtx1IGibGRrO3DJsTPhOcE"; 
      const model = "gemini-2.5-flash-lite";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        ...(systemInstruction && { systemInstruction: { parts: [{ text: systemInstruction }] } })
      };

      const delay = (ms) => new Promise(res => setTimeout(res, ms));
      const maxRetries = 3;

      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            let errorDetail = "";
            try {
              const errBody = await response.json();
              errorDetail = errBody?.error?.message || JSON.stringify(errBody);
            } catch(e) { errorDetail = response.statusText; }

            // 429: 요청 한도 초과 → 재시도 가치 있음
            if (response.status === 429) {
              if (attempt < maxRetries) {
                await delay(3000 * (attempt + 1)); // 3초, 6초, 9초 대기
                continue;
              }
              throw new Error(`요청 한도 초과 (429): ${errorDetail}\n\n→ Google AI Studio(aistudio.google.com)에서 API 키 할당량을 확인해보세요.`);
            }
            // 400: 잘못된 요청 (모델명 오류 등)
            if (response.status === 400) {
              throw new Error(`요청 형식 오류 (400): ${errorDetail}`);
            }
            // 403: 권한 없음 / API 미활성화
            if (response.status === 403) {
              throw new Error(`API 키 권한 오류 (403): ${errorDetail}\n\n→ Google AI Studio에서 API 키가 정상인지 확인해보세요.`);
            }
            // 404: 모델을 찾을 수 없음
            if (response.status === 404) {
              throw new Error(`모델을 찾을 수 없음 (404): ${model} 모델이 현재 사용 불가능합니다.`);
            }
            // 기타
            throw new Error(`API 오류 (${response.status}): ${errorDetail}`);
          }
          
          const data = await response.json();
          const text = data.candidates && 
                       data.candidates[0] && 
                       data.candidates[0].content && 
                       data.candidates[0].content.parts && 
                       data.candidates[0].content.parts[0] && 
                       data.candidates[0].content.parts[0].text;
                       
          return text || "결과를 생성하지 못했습니다.";
        } catch (error) {
          if (attempt === maxRetries || !error.message?.includes('Failed to fetch')) {
            throw error;
          }
          await delay(2000 * (attempt + 1));
        }
      }
    };

    const CATEGORIES = ['일상', '숙소', '맛집', '식물', '뷰티'];

    function App() {
      // --- 클라우드 자동 저장 상태 ---
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [isSidebarExpanded, setIsSidebarExpanded] = useState(true);
      const [dbError, setDbError] = useState(false); // DB 연동 에러 표시용 상태

      const [activeTab, setActiveTab] = useState('generation');
      
      const [learnedStyles, setLearnedStyles] = useState({
        '일상': '아직 학습된 스타일이 없습니다. 예시 글을 넣고 학습시켜주세요.',
        '숙소': '아직 학습된 스타일이 없습니다. 예시 글을 넣고 학습시켜주세요.',
        '맛집': '아직 학습된 스타일이 없습니다. 예시 글을 넣고 학습시켜주세요.',
        '식물': '아직 학습된 스타일이 없습니다. 예시 글을 넣고 학습시켜주세요.',
        '뷰티': '아직 학습된 스타일이 없습니다. 예시 글을 넣고 학습시켜주세요.',
      });

      const [activeCategory, setActiveCategory] = useState('맛집');
      const [learningInput, setLearningInput] = useState('');
      const [isLearning, setIsLearning] = useState(false);
      const [editingPostIndex, setEditingPostIndex] = useState(null); // null=추가모드, 숫자=수정모드
      const MAX_SAMPLES = 3;

      const [samplePosts, setSamplePosts] = useState({
        '일상': [], '숙소': [], '맛집': [], '식물': [], '뷰티': [],
      });

      const [genInputs, setGenInputs] = useState({ 
        title: '', pros: '', cons: '', keywords: '', wordCount: '', photoCount: '', tone: '', avoidKeywords: ''
      });
      const [generatedPosts, setGeneratedPosts] = useState([]);
      const [activeVersionTab, setActiveVersionTab] = useState(0);
      const [isGenerating, setIsGenerating] = useState(false);
      const [copied, setCopied] = useState(false);

      const DEFAULT_SITES = ['레뷰', '디너의여왕', '강남맛집', '링블', '리플', '개인협찬', '기타'];
      const [sponsorSites, setSponsorSites] = useState(DEFAULT_SITES);
      const [showSiteManager, setShowSiteManager] = useState(false);
      const [newSiteName, setNewSiteName] = useState('');
      const [campaigns, setCampaigns] = useState([]);
      
      const [newCampaign, setNewCampaign] = useState({ 
        site: '레뷰', title: '', item: '', region: '', amount: '', visitDate: '', deadline: '', notes: '' 
      });
      
      const [campaignFilter, setCampaignFilter] = useState('전체'); 
      const [sortOption, setSortOption] = useState('마감순'); 
      const [statusFilter, setStatusFilter] = useState('전체'); 

      const [adRevenue, setAdRevenue] = useState({});
      const [currentDate, setCurrentDate] = useState(new Date());
      const [editingDate, setEditingDate] = useState(null);
      const [editAmount, setEditAmount] = useState('');

      // 클라우드 인증
      useEffect(() => {
        auth.signInAnonymously().catch(console.error);
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // 클라우드 데이터 동기화
      useEffect(() => {
        if (!user) return;

        const handleError = (error) => {
          // 백그라운드 콘솔 에러가 화면을 가리지 않도록 조용히 처리하고 커스텀 배너만 띄움
          console.warn("Firestore Sync Error. Retrying in background...", error.message);
          if (error.code === 'permission-denied' || error.message.includes('not been used') || error.message.includes('disabled')) {
            setDbError(true);
          }
        };

        const stylesRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/styles`);
        const unsubStyles = stylesRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setLearnedStyles(docSnap.data().data);
          setDbError(false); // 연결 성공 시 에러 배너 숨김
        }, handleError);

        const campaignsRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/campaigns`);
        const unsubCampaigns = campaignsRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setCampaigns(docSnap.data().data);
        }, handleError);

        const revenueRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/adRevenue`);
        const unsubRevenue = revenueRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setAdRevenue(docSnap.data().data);
        }, handleError);

        const samplesRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/samplePosts`);
        const unsubSamples = samplesRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const raw = docSnap.data().data;
            const clean = {};
            CATEGORIES.forEach(cat => {
              clean[cat] = Array.isArray(raw[cat]) ? [...raw[cat]] : [];
            });
            setSamplePosts(clean);
          }
        }, handleError);

        const sitesRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/sponsorSites`);
        const unsubSites = sitesRef.onSnapshot((docSnap) => {
          if (docSnap.exists && Array.isArray(docSnap.data().data)) {
            setSponsorSites(docSnap.data().data);
          }
        }, handleError);

        return () => { unsubStyles(); unsubCampaigns(); unsubRevenue(); unsubSamples(); unsubSites(); };
      }, [user]);

      const updateLearnedStyles = async (newStyles) => {
        setLearnedStyles(newStyles);
        if (user) {
          setIsSyncing(true);
          try {
            await db.doc(`artifacts/${appId}/users/${user.uid}/appData/styles`).set({ data: newStyles });
            setDbError(false);
          } catch (e) {
            if (e.code === 'permission-denied') setDbError(true);
          }
          setIsSyncing(false);

      const handleLearnStyle = async () => {

          prompt += `4. **글 구조**: 도입부 스타일(질문형/선언형/일상 시작), 중간 전개 방식, 마무리 패턴\n`;
          prompt += `5. **문단 나누기**: 한 문단 평균 문장 수, 줄바꿈 빈도, 사진 위치 배치 패턴\n`;

          prompt += `7. **톤 & 분위기**: 전체적인 감성(솔직한/꾸밈없는/정보전달/감성적 등)\n`;
          prompt += `8. **금기사항**: 이 블로거가 절대 안 쓸 것 같은 표현이나 스타일\n\n`;
          prompt += `위 8개 항목을 반드시 모두 포함하여 마크다운 형식으로 정리해줘. 가능한 한 원문의 실제 표현을 인용해서 구체적으로 작성해.\n\n`;
          
          posts.forEach((post, i) => {

          const newStyle = await callGemini(prompt, "너는 블로그 글쓰기 스타일 분석 전문가야. 추상적인 요약이 아니라, AI가 이 사람의 글을 완벽히 흉내 낼 수 있을 정도로 구체적이고 실용적인 분석을 해야 해. 여러 예시에서 공통적으로 나타나는 패턴을 중심으로 분석하되, 반드시 원문의 실제 문장과 표현을 인용하면서 분석해.");

      const handleGeneratePost = async () => {

        try {

          if (genInputs.wordCount) prompt += `요구 분량: ${genInputs.wordCount}\n`;
          if (genInputs.tone) prompt += `원하는 분위기: ${genInputs.tone}\n`;
          if (genInputs.photoCount) prompt += `사진 배치: ${genInputs.photoCount} (조건에 맞춰 본문 중간에 "[사진 들어갈 곳]" 적절히 분배해)\n`;
          prompt += `\n위 내용을 바탕으로 네이버 블로그 포스팅 초안을 작성해줘. 제목도 추천해줘.\n서로 다른 도입부, 분위기, 전개 방식을 가진 **3가지 다른 버전**의 블로그 초안을 작성해줘.\n\n중요: 각 버전을 반드시 아래 형식으로 구분해줘:\n[버전1]\n(첫 번째 초안)\n[버전2]\n(두 번째 초안)\n[버전3]\n(세 번째 초안)\n\n절대 지켜야 할 규칙: 본문에 마크다운 문법(**, *, #, ##, ### 등)을 절대 사용하지 마. 키워드 강조도 **없이** 그냥 일반 텍스트로만 써. 네이버 블로그에 바로 붙여넣을 수 있는 순수 텍스트여야 해.`;

          const systemInstruction = styleGuide && !styleGuide.includes('아직 학습된') && !styleGuide.includes('다시 학습을') 
            ? `너는 내 블로그 전담 에디터야. 아래 [스타일 분석 결과]에 나온 문체, 어미, 표현, 이모티콘, 글 구조를 100% 그대로 따라해야 해.\n특히:\n- 분석에 나온 "자주 쓰는 표현"은 반드시 자연스럽게 섞어 써\n- 어미 패턴(~요, ~임, ~ㅋㅋ 등)을 정확히 맞춰\n- 문단 길이와 줄바꿈 패턴도 동일하게\n- "금기사항"에 나온 표현은 절대 쓰지 마\n- AI가 쓴 티가 나면 안 돼. 진짜 이 블로거가 직접 쓴 것처럼 자연스러워야 해\n\n반드시 [버전1] [버전2] [버전3] 태그로 각 버전을 명확히 구분해서 작성해.\n\n[스타일 분석 결과]\n${styleGuide}`
            : `너는 네이버 블로그 전문 에디터야. 자연스럽고 사람 냄새 나는 블로그 글을 작성해야 해. AI가 쓴 티가 나면 안 돼.\n반드시 [버전1] [버전2] [버전3] 태그로 각 버전을 명확히 구분해서 작성해.`;
          const result = await callGemini(prompt, systemInstruction);
          
          // 스마트 파싱: [버전1], [버전2], [버전3] 태그로 분리
          let versions = [];
          const tagPattern = /\[버전\s*[1-3]\]/g;
          const tagMatches = [...result.matchAll(tagPattern)];
          
          if (tagMatches.length >= 2) {
            // [버전N] 태그가 2개 이상 있으면 그걸로 분리
            for (let i = 0; i < tagMatches.length; i++) {
              const start = tagMatches[i].index + tagMatches[i][0].length;
              const end = i + 1 < tagMatches.length ? tagMatches[i + 1].index : result.length;
              const chunk = result.substring(start, end).trim();
              if (chunk.length > 0) versions.push(chunk);
            }
          } else {
            // 태그가 없으면 ||| 또는 --- 또는 "버전 N" 등으로 시도
            const fallbackSplit = result.split(/\|\|\||---{3,}|={3,}|버전\s*[2-3]\s*[.:)\]]/);
            versions = fallbackSplit.map(v => v.trim()).filter(v => v.length > 30);
          }
          
          // 그래도 1개면 전체를 버전1로
          if (versions.length === 0) versions = [result];
          
          // 마크다운 기호 제거 (**, *, #, ## 등)
          versions = versions.map(v => v
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/\*(.*?)\*/g, '$1')
            .replace(/^#{1,6}\s+/gm, '')
            .replace(/`(.*?)`/g, '$1')
          );
          
          if (versions.length > 0) {
            setGeneratedPosts(versions); setActiveVersionTab(0);
          } else { throw new Error("결과 파싱 실패. 다시 시도해주세요."); }

            </div>

          {/* Sidebar */}
          <nav className={`bg-white border-b md:border-b-0 md:border-r border-gray-200 px-4 py-3 md:py-6 flex flex-row md:flex-col gap-2 z-20 flex-shrink-0 overflow-x-auto items-center md:items-stretch no-scrollbar transition-all duration-300 w-full ${isSidebarExpanded ? 'md:w-64' : 'md:w-20'}`}>

                    <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p className="text-xs text-gray-500 mb-1">수령 완료 가치</p><p className="text-2xl font-bold text-[#03C75A] mt-2">{completedSponsorAmount.toLocaleString()}<span className="text-sm ml-1">원</span></p></div>
                    <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p className="text-xs text-gray-500 mb-1">진행 중인 가치</p><p className="text-2xl font-bold text-red-500 mt-2">{(totalSponsorAmount - completedSponsorAmount).toLocaleString()}<span className="text-sm ml-1">원</span></p></div>
                    <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl p-5 shadow-md text-white"><p className="text-xs text-green-300 mb-1">전체 달성률</p><div className="flex items-end gap-2 mt-2"><p className="text-3xl font-bold">{totalSponsorAmount > 0 ? Math.round((completedSponsorAmount / totalSponsorAmount) * 100) : 0}<span className="text-lg ml-1">%</span></p></div></div>
                  </div>
                  <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-chart-simple text-gray-600"></i> 플랫폼별 상세 분석</h3>
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    {sortedSponsorSites.map(([siteName, data]) => {
                      const sitePercentage = totalSponsorAmount > 0 ? Math.round((data.totalAmount / totalSponsorAmount) * 100) : 0;
                      const completionRate = data.count > 0 ? Math.round((data.completedCount / data.count) * 100) : 0;
                      const averageAmount = data.count > 0 ? Math.round(data.totalAmount / data.count) : 0;
                      return (
                        <div key={siteName} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                          <div className="flex justify-between items-start mb-4">
                            <div className="flex items-center gap-3">
                              <div className="w-10 h-10 rounded-full bg-green-50 flex justify-center items-center font-bold text-[#03C75A] text-sm border">{siteName.substring(0, 2)}</div>
                              <div><h4 className="font-bold text-gray-900">{siteName}</h4><p className="text-[11px] text-gray-500">수익 점유율: {sitePercentage}%</p></div>
                            </div>
                            <div className="text-right"><p className="text-lg font-bold text-[#03C75A]">{data.totalAmount.toLocaleString()}원</p><p className="text-[11px] text-gray-500">평균 단가: {averageAmount.toLocaleString()}원</p></div>
                          </div>
                          <div className="mt-auto pt-4 border-t border-gray-50 grid grid-cols-2 gap-4">
                            <div><div className="flex justify-between text-[11px] font-semibold text-gray-500 mb-1.5"><span>진행 현황</span><span>{completionRate}%</span></div><div className="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden"><div className="bg-[#03C75A] h-1.5 rounded-full" style={{ width: `${completionRate}%` }}></div></div></div>
                            <div className="flex justify-end items-center gap-2 text-xs"><span className="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md font-semibold border border-gray-200">대기 {data.count - data.completedCount}건</span></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* 5. AD REVENUE TAB */}
            {activeTab === 'ad_revenue' && (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 h-full flex flex-col relative">
                <div className="mb-4 md:mb-6"><h2 className="text-xl md:text-2xl font-bold text-gray-900 flex items-center gap-2"><i className="fa-solid fa-arrow-trend-up text-2xl text-[#03C75A]"></i> 광고수익 기록</h2></div>
                <div className="flex flex-col gap-3 md:gap-4 mb-4 md:mb-6">
                  <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl p-5 md:p-6 shadow-md text-white flex-shrink-0">
                    <h3 className="text-xs md:text-sm font-semibold text-gray-300 mb-3 md:mb-4 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-[#03C75A]"></i> 역대 누적 애드포스트 성과</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 divide-y sm:divide-y-0 sm:divide-x divide-gray-700">
                      <div className="pt-2 sm:pt-0"><p className="text-gray-400 text-[10px] md:text-xs mb-0.5 md:mb-1">총 누적 수익</p><p className="text-2xl md:text-3xl font-bold">{allTimeTotal.toLocaleString()}원</p></div>
                      <div className="pt-3 sm:pt-0 sm:pl-4 md:pl-6"><p className="text-gray-400 text-[10px] md:text-xs mb-0.5 md:mb-1">전체 일 평균 수익</p><p className="text-lg md:text-xl font-semibold">{allTimeAvg.toLocaleString()}원</p></div>
                      <div className="pt-3 sm:pt-0 sm:pl-4 md:pl-6"><p className="text-gray-400 text-[10px] md:text-xs mb-0.5 md:mb-1">역대 최고 매출 (1일)</p><p className="text-lg md:text-xl font-semibold">{allTimeMax.toLocaleString()}원</p></div>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4">
                    <div className="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                      <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><i className="fa-solid fa-dollar-sign text-xl text-[#03C75A]"></i></div>
                      <div><p className="text-[10px] md:text-xs font-semibold text-gray-500 mb-0.5 md:mb-1">{currentDate.getMonth() + 1}월 총 수익</p><p className="text-lg md:text-xl font-bold text-gray-900">{totalRevenue.toLocaleString()}원</p></div>
                    </div>
                    <div className="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                      <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><i className="fa-solid fa-arrow-trend-up text-xl text-[#03C75A]"></i></div>
                      <div><p className="text-[10px] md:text-xs font-semibold text-gray-500 mb-0.5 md:mb-1">{currentDate.getMonth() + 1}월 일 평균</p><p className="text-lg md:text-xl font-bold text-gray-900">{avgRevenue.toLocaleString()}원</p></div>
                    </div>
                    <div className="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                      <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0"><i className="fa-regular fa-clock text-xl text-gray-500"></i></div>
                      <div><p className="text-[10px] md:text-xs font-semibold text-gray-500 mb-0.5 md:mb-1">{currentDate.getMonth() + 1}월 최고 매출</p><p className="text-lg md:text-xl font-bold text-gray-900">{maxRevenue.toLocaleString()}원</p></div>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 flex-1 flex flex-col min-h-[400px]">
                  <div className="flex justify-between items-center mb-4 md:mb-6">
                    <button onClick={handlePrevMonth} className="p-1.5 md:p-2 hover:bg-gray-100 rounded-lg"><i className="fa-solid fa-chevron-left text-xl text-gray-600"></i></button>
                    <h3 className="text-base md:text-lg font-bold text-gray-800">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h3>
                    <button onClick={handleNextMonth} className="p-1.5 md:p-2 hover:bg-gray-100 rounded-lg"><i className="fa-solid fa-chevron-right text-xl text-gray-600"></i></button>
                  </div>
                  <div className="grid grid-cols-7 gap-px bg-gray-200 border border-gray-200 rounded-xl overflow-hidden flex-1">
                    {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => <div key={day} className={`bg-gray-50 py-2 text-center text-xs md:text-sm font-semibold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-[#03C75A]' : 'text-gray-700'}`}>{day}</div>)}
                    {Array.from({ length: getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth()) }).map((_, i) => <div key={`empty-${i}`} className="bg-white min-h-[60px] md:min-h-[90px]" />)}
                    {Array.from({ length: getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth()) }).map((_, i) => {
                      const day = i + 1;
                      const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                      const amount = adRevenue[dateStr];
                      const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();
                      return (
                        <div key={day} onClick={() => openRevenueModal(dateStr, amount)} className={`bg-white min-h-[60px] md:min-h-[90px] p-1 md:p-2 cursor-pointer hover:bg-gray-50 flex flex-col group ${isToday ? 'ring-2 ring-inset ring-[#03C75A]' : ''}`}>
                          <span className={`text-[10px] md:text-sm font-medium mb-0.5 md:mb-1 ${isToday ? 'text-[#03C75A]' : 'text-gray-600'}`}>{day}</span>
                          {amount && <div className="mt-auto bg-green-50 text-green-700 text-[9px] md:text-xs font-bold py-0.5 px-1 md:py-1 md:px-1.5 rounded text-right truncate">+{amount.toLocaleString()}원</div>}
                          {!amount && <div className="mt-auto opacity-0 md:group-hover:opacity-100 text-[8px] md:text-[10px] text-gray-400 text-right hidden md:block">클릭</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {editingDate && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center bg-gray-900/40 rounded-2xl backdrop-blur-sm p-4">
                    <div className="bg-white p-5 md:p-6 rounded-2xl shadow-xl w-full max-w-sm">
                      <div className="flex justify-between items-center mb-4">
                        <h4 className="font-bold text-gray-800 text-base md:text-lg">{editingDate.split('-')[1]}월 {editingDate.split('-')[2]}일 수익 입력</h4>
                        <button onClick={() => setEditingDate(null)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                      </div>
                      <div className="relative mb-5">
                        <input type="text" value={editAmount} onChange={(e) => setEditAmount(e.target.value.replace(/[^0-9]/g, ''))} placeholder="숫자만 입력" className="w-full p-3 pr-8 rounded-xl border border-gray-200 outline-none text-right font-bold text-base md:text-lg" autoFocus />
                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold">원</span>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => setEditingDate(null)} className="flex-1 py-2.5 md:py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 text-sm md:text-base">취소</button>
                        <button onClick={saveRevenue} className="flex-1 py-2.5 md:py-3 rounded-xl bg-[#03C75A] text-white font-semibold hover:bg-[#02b350] shadow-sm text-sm md:text-base">저장하기</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
