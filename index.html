      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    #splash-screen img {
      width: 120px;
      height: 120px;
      animation: splash-bounce 1.2s ease-in-out infinite;
    }
    #splash-screen h1 {
      margin-top: 20px;
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.03em;
    }
    #splash-screen p {
      margin-top: 8px;
      font-size: 13px;
      color: #888;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    #splash-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 3px;
      border-radius: 50%;
      background: #03C75A;
      animation: splash-dot 1.4s infinite ease-in-out both;
    }
    #splash-dots span:nth-child(1) { animation-delay: 0s; }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes splash-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes splash-dot {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

    // --- 제미나이 API 호출 함수 ---
    const callGemini = async (prompt, systemInstruction = "", apiKey = "") => {
      if (!apiKey) throw new Error("API 키가 설정되지 않았습니다.\n\n→ 설정 메뉴에서 Gemini API 키를 입력해주세요.");
      const model = "gemini-2.5-flash-lite";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        ...(systemInstruction && { systemInstruction: { parts: [{ text: systemInstruction }] } })
      };

      const delay = (ms) => new Promise(res => setTimeout(res, ms));
      const maxRetries = 3;

      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            let errorDetail = "";
            try {
              const errBody = await response.json();
              errorDetail = errBody?.error?.message || JSON.stringify(errBody);
            } catch(e) { errorDetail = response.statusText; }

            // 429: 요청 한도 초과 → 재시도 가치 있음
            if (response.status === 429) {
              if (attempt < maxRetries) {
                await delay(3000 * (attempt + 1)); // 3초, 6초, 9초 대기
                continue;
              }
              throw new Error(`요청 한도 초과 (429): ${errorDetail}\n\n→ Google AI Studio(aistudio.google.com)에서 API 키 할당량을 확인해보세요.`);
            }
            // 400: 잘못된 요청 (모델명 오류 등)
            if (response.status === 400) {
              throw new Error(`요청 형식 오류 (400): ${errorDetail}`);
            }
            // 403: 권한 없음 / API 미활성화
            if (response.status === 403) {
              throw new Error(`API 키 권한 오류 (403): ${errorDetail}\n\n→ Google AI Studio에서 API 키가 정상인지 확인해보세요.`);
            }
            // 404: 모델을 찾을 수 없음
            if (response.status === 404) {
              throw new Error(`모델을 찾을 수 없음 (404): ${model} 모델이 현재 사용 불가능합니다.`);
            }
            // 기타
            throw new Error(`API 오류 (${response.status}): ${errorDetail}`);
          }
          
          const data = await response.json();
          const text = data.candidates && 
                       data.candidates[0] && 
                       data.candidates[0].content && 
                       data.candidates[0].content.parts && 
                       data.candidates[0].content.parts[0] && 
                       data.candidates[0].content.parts[0].text;
                       
          return text || "결과를 생성하지 못했습니다.";
        } catch (error) {
          if (attempt === maxRetries || !error.message?.includes('Failed to fetch')) {
            throw error;
          }
          await delay(2000 * (attempt + 1));
        }
      }
    };

    const CATEGORIES = ['일상', '숙소', '맛집', '식물', '뷰티'];

      // 설정

      // 해시태그

      useEffect(() => {

        const handleError = (error) => {

          console.warn("Firestore Sync Error. Retrying in background...", error.message);

          const systemInstruction = styleGuide && !styleGuide.includes('아직 학습된') && !styleGuide.includes('다시 학습을') 
            ? `너는 내 블로그 전담 에디터야. 아래 [스타일 분석 결과]에 나온 문체, 어미, 표현, 이모티콘, 글 구조를 100% 그대로 따라해야 해.\n특히:\n- 분석에 나온 "자주 쓰는 표현"은 반드시 자연스럽게 섞어 써\n- 어미 패턴(~요, ~임, ~ㅋㅋ 등)을 정확히 맞춰\n- **줄바꿈/문단 간격 패턴이 가장 중요**: 분석 결과에 나온 빈 줄 개수, 문단 간격을 정확히 재현해. 예를 들어 "한 줄 쓰고 빈 줄 3줄"이면 실제로 줄바꿈을 3번 넣어야 해\n- 사진 위치도 "[사진]"으로 표시하되, 분석된 배치 패턴(도입부 사진, 중간 사진, 마무리 사진 등)을 따라해\n- 인용구가 학습되었으면 적절히 사용해\n- "금기사항"에 나온 표현은 절대 쓰지 마\n- AI가 쓴 티가 나면 안 돼. 진짜 이 블로거가 직접 쓴 것처럼 자연스러워야 해\n- 출력은 순수 텍스트로. 마크다운(**, *, # 등) 절대 사용 금지\n\n반드시 [버전1] [버전2] [버전3] 태그로 각 버전을 명확히 구분해서 작성해.\n\n[스타일 분석 결과]\n${styleGuide}`
            : `너는 네이버 블로그 전문 에디터야. 자연스럽고 사람 냄새 나는 블로그 글을 작성해야 해. AI가 쓴 티가 나면 안 돼.\n반드시 [버전1] [버전2] [버전3] 태그로 각 버전을 명확히 구분해서 작성해.`;
          const result = await callGemini(prompt, systemInstruction, geminiApiKey);
          
          // 스마트 파싱: [버전1], [버전2], [버전3] 태그로 분리
          let versions = [];
          const tagPattern = /\[버전\s*[1-3]\]/g;
          const tagMatches = [...result.matchAll(tagPattern)];
          
          if (tagMatches.length >= 2) {
            // [버전N] 태그가 2개 이상 있으면 그걸로 분리
            for (let i = 0; i < tagMatches.length; i++) {
              const start = tagMatches[i].index + tagMatches[i][0].length;
              const end = i + 1 < tagMatches.length ? tagMatches[i + 1].index : result.length;
              const chunk = result.substring(start, end).trim();
              if (chunk.length > 0) versions.push(chunk);
            }
          } else {
            // 태그가 없으면 ||| 또는 --- 또는 "버전 N" 등으로 시도
            const fallbackSplit = result.split(/\|\|\||---{3,}|={3,}|버전\s*[2-3]\s*[.:)\]]/);
            versions = fallbackSplit.map(v => v.trim()).filter(v => v.length > 30);
          }
          
          // 그래도 1개면 전체를 버전1로
          if (versions.length === 0) versions = [result];
          
          // 마크다운 기호 제거 (**, *, #, ## 등)
          versions = versions.map(v => v
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/\*(.*?)\*/g, '$1')
            .replace(/^#{1,6}\s+/gm, '')
            .replace(/`(.*?)`/g, '$1')
          );
          
          if (versions.length > 0) {
            setGeneratedPosts(versions); setActiveVersionTab(0);
          } else { throw new Error("결과 파싱 실패. 다시 시도해주세요."); }
        } catch (error) { alert(error.message); } finally { setIsGenerating(false); }
      };

      const copyToClipboard = async () => {
        if (generatedPosts.length === 0) return;
        try {
          await navigator.clipboard.writeText(generatedPosts[activeVersionTab]);
          setCopied(true); setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          const textArea = document.createElement("textarea");
          textArea.value = generatedPosts[activeVersionTab];
          document.body.appendChild(textArea); textArea.select();
          try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (e) {}
          document.body.removeChild(textArea);
        }
      };

      // 해시태그 생성
      const handleGenerateHashtags = async () => {
        if (generatedPosts.length === 0) return;
        setIsGeneratingTags(true);
        try {
          const currentPost = generatedPosts[activeVersionTab];
          let prompt = `아래 네이버 블로그 글을 읽고, 이 글에 적합한 네이버 블로그 해시태그를 15개 생성해줘.\n\n`;
          prompt += `규칙:\n`;
          prompt += `- 각 태그는 #으로 시작\n`;
          prompt += `- 검색 유입에 유리한 키워드 위주로\n`;
          prompt += `- 일반적인 태그(예: #맛집추천)와 구체적인 태그(예: #강남맛집) 섞어서\n`;
          prompt += `- 태그만 한 줄로 출력, 다른 설명 없이\n\n`;
          if (genInputs.keywords) prompt += `필수 포함 키워드: ${genInputs.keywords}\n\n`;
          prompt += `[블로그 글]:\n${currentPost.substring(0, 2000)}`;

          let result = await callGemini(prompt, "너는 네이버 블로그 SEO 전문가야. 해시태그만 출력해.", geminiApiKey);
          result = result.replace(/\*\*/g, '').replace(/^#{1,6}\s+/gm, '').trim();
          setHashtags(result);
        } catch (error) {
          alert(error.message);
        } finally {
          setIsGeneratingTags(false);
        }
      };

      // 해시태그 복사
      const copyHashtags = async () => {
        try {
          await navigator.clipboard.writeText(hashtags);
          setCopiedTags(true); setTimeout(() => setCopiedTags(false), 2000);
        } catch (err) {
          const ta = document.createElement("textarea"); ta.value = hashtags;
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); setCopiedTags(true); setTimeout(() => setCopiedTags(false), 2000); } catch(e){}
          document.body.removeChild(ta);
        }
      };

      // D-Day 알림 데이터
      const getUrgentCampaigns = () => {
        const today = new Date(); today.setHours(0,0,0,0);
        return campaigns
          .filter(c => c.status === 'pending' && c.deadline)
          .map(c => {
            const target = new Date(c.deadline);
            const diff = Math.ceil((target.getTime() - today.getTime()) / (1000*60*60*24));
            return { ...c, daysLeft: diff };
          })
          .filter(c => c.daysLeft <= 3)
          .sort((a, b) => a.daysLeft - b.daysLeft);
      };
      const urgentCampaigns = getUrgentCampaigns();

      // 로그인 안 된 상태 → 로그인 화면
      if (!user) {
        return (
          <div className="h-screen bg-gray-50 flex items-center justify-center font-sans p-4">
            <div className="bg-white rounded-3xl shadow-lg border border-gray-100 p-6 md:p-12 max-w-sm w-full text-center">
              <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-[#03C75A]/10 flex items-center justify-center text-3xl">🐻</div>
              <h1 className="text-2xl font-bold text-gray-900 mb-2">PowerBloger</h1>
              <p className="text-sm text-gray-500 mb-8">내 스타일 그대로, AI가 써주는 블로그</p>
              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-400 hover:shadow-md text-gray-700 font-semibold py-3.5 rounded-xl transition-all">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google로 시작하기
              </button>
              <p className="text-xs text-gray-400 mt-6">로그인하면 모든 기기에서 데이터가 동기화됩니다.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen bg-gray-50 flex flex-col md:flex-row font-sans text-gray-800 overflow-hidden relative">
          
          {/* 에러 배너 (Firestore Database 비활성화 시 노출) */}

            <div className="absolute top-0 left-0 w-full z-50 bg-red-500 text-white px-4 py-3 shadow-lg flex justify-between items-center animate-in slide-in-from-top-4">
              <div className="flex items-center gap-3 text-sm md:text-base font-semibold">
                <i className="fa-solid fa-triangle-exclamation text-xl"></i>
                <p>
                  데이터베이스 연결 중: <strong>Firestore</strong> 생성이 아직 반영되지 않았습니다. 생성을 완료하셨다면 1~2분 뒤 새로고침 해주세요!
                </p>
              </div>
              <button onClick={() => setDbError(false)} className="p-1 hover:bg-red-600 rounded"><i className="fa-solid fa-xmark"></i></button>
            </div>
          )}

          {/* Sidebar */}
          <nav className={`bg-white border-b md:border-b-0 md:border-r border-gray-200 px-1.5 py-1.5 md:px-4 md:py-6 flex flex-row md:flex-col gap-0.5 md:gap-2 z-20 flex-shrink-0 overflow-x-auto items-center md:items-stretch no-scrollbar transition-all duration-300 w-full ${isSidebarExpanded ? 'md:w-64' : 'md:w-20'}`}>

                  </div>

                  {/* 계정 정보 */}
                  <div className="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-gray-100">
                    <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-user-circle text-[#03C75A]"></i> 계정</h3>
                    <div className="flex items-center gap-3 mb-4">
                      {user?.photoURL && <img src={user.photoURL} alt="" className="w-10 h-10 rounded-full" referrerPolicy="no-referrer" />}
                      <div>
                        <p className="text-sm font-semibold text-gray-800">{user?.displayName || '사용자'}</p>
                        <p className="text-xs text-gray-500">{user?.email}</p>
                      </div>
                    </div>
                    <button onClick={handleLogout} className="w-full py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 hover:border-gray-300 transition-all flex items-center justify-center gap-2">
                      <i className="fa-solid fa-right-from-bracket"></i> 로그아웃
                    </button>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 알림 모달 */}
          {showNotifications && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm p-4" onClick={() => setShowNotifications(false)}>
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={(e) => e.stopPropagation()}>
                <div className="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
                  <h4 className="font-bold text-base text-gray-800 flex items-center gap-2"><i className="fa-solid fa-bell text-[#03C75A]"></i> 마감 알림</h4>
                  <button onClick={() => setShowNotifications(false)} className="text-gray-400 hover:text-gray-600 p-1"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="max-h-80 overflow-y-auto">
                  {urgentCampaigns.length === 0 ? (
                    <div className="p-8 text-center text-gray-400">
                      <i className="fa-solid fa-circle-check text-3xl mb-2 text-[#03C75A]"></i>
                      <p className="text-sm font-medium">3일 이내 마감 캠페인이 없습니다</p>
                    </div>
                  ) : (
                    urgentCampaigns.map(c => (
                      <div key={c.id} className={`px-5 py-3 border-b border-gray-50 flex items-center gap-3 ${c.daysLeft <= 0 ? 'bg-red-50' : ''}`}>
                        <span className={`text-xs font-bold px-2.5 py-1 rounded-lg flex-shrink-0 ${c.daysLeft <= 0 ? 'bg-red-100 text-red-600' : c.daysLeft <= 1 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600'}`}>
                          {c.daysLeft < 0 ? `D+${Math.abs(c.daysLeft)}` : c.daysLeft === 0 ? 'D-Day' : `D-${c.daysLeft}`}
                        </span>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold text-gray-800 truncate">{c.title}</p>
                          <p className="text-xs text-gray-400 mt-0.5">{c.site} · 마감 {c.deadline}</p>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
